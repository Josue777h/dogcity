<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Sigue tu pedido en Dog City en tiempo real." />
  <meta name="theme-color" content="#1A1A1A" />
  <title>Dog City | Rastreo de Pedido</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles-v3.css" />
  <link rel="icon" href="images/uploads/DOGCITY.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    /* Estilos específicos para el Rastreador integrados con v3 */
    .tracker-card-v3 { max-width: 500px; margin: 0 auto; width: 100%; }
    .status-timeline-v3 { position: relative; margin-top: 30px; padding-left: 10px; }
    .timeline-item-v3 { display: flex; gap: 20px; margin-bottom: 25px; position: relative; }
    /* Línea del timeline */
    .timeline-item-v3:not(:last-child)::after {
      content: ''; position: absolute; left: 19px; top: 40px; width: 2px;
      height: calc(100% - 15px); background: #e2e8f0; z-index: 1;
    }
    .timeline-item-v3.active:not(:last-child)::after { background: #ffc107; }
    .timeline-item-v3.completed:not(:last-child)::after { background: #25d366; }
    .timeline-icon-v3 {
      width: 40px; height: 40px; border-radius: 50%; background: #f1f5f9;
      display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
      flex-shrink: 0; z-index: 2; border: 3px solid #fff;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: all 0.3s ease;
    }
    .timeline-item-v3.active .timeline-icon-v3 {
      background: #fff3e0; color: #e65100; border-color: #ffc107; transform: scale(1.1);
    }
    .timeline-item-v3.completed .timeline-icon-v3 {
      background: #e8f5e9; color: #2e7d32; border-color: #25d366;
    }
    .timeline-content-v3 { padding-top: 4px; }
    .timeline-content-v3 h3 { margin: 0; font-size: 0.95rem; font-weight: 800; color: #1a1a1a; }
    .timeline-content-v3 p { margin: 2px 0 0; font-size: 0.8rem; color: #64748b; font-weight: 500; }
    .order-details-box { margin-top: 25px; padding: 16px; background: #f8fafc; border-radius: 16px; border: 1px solid #e2e8f0; }
    .detail-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.85rem; }
    .detail-row span:first-child { color: #64748b; font-weight: 600; }
    .detail-row span:last-child { color: #1a1a1a; font-weight: 800; }
    .pulse-amber { animation: pulse-amber 2s infinite; }
    @keyframes pulse-amber {
      0% { box-shadow: 0 0 0 0 rgba(255, 193, 7, 0.4); }
      70% { box-shadow: 0 0 0 10px rgba(255, 193, 7, 0); }
      100% { box-shadow: 0 0 0 0 rgba(255, 193, 7, 0); }
    }
    .loading-wrap { padding: 60px 20px; text-align: center; }
    .back-btn-v3 {
      display: block; width: 100%; text-align: center; margin-top: 20px; padding: 12px;
      background: #f1f5f9; color: #475569; border-radius: 12px; text-decoration: none;
      font-weight: 700; font-size: 0.85rem; transition: all 0.2s;
    }
    .back-btn-v3:hover { background: #e2e8f0; color: #1e293b; }
  </style>
</head>
<body data-page="tracking" class="theme-dark-global">

  <div class="global-bg-wrapper">
    <main class="app-card">
      <header class="app-card-header">
        <a href="index.html" class="brand-v3">
          <img src="images/uploads/DOGCITY.png" alt="Dog City" />
          <div class="brand-text-v3">
            <strong>DOG CITY</strong>
            <span>SEGUIMIENTO DE PEDIDO 🌭</span>
          </div>
        </a>
        <a href="index.html" class="btn-refresh" style="text-decoration:none; font-size:0.75rem;">← Inicio</a>
      </header>

      <div class="admin-body-wrap">
        <div id="trackingContent" class="tracker-card-v3">
          <div class="loading-wrap">
            <div class="loading-spinner"></div>
            <p style="margin-top: 15px; color:#666; font-weight:600;">Conectando con la cocina...</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <footer class="site-footer">
    <div class="footer-container-v3">
      <div class="footer-brand-mini">DOG CITY</div>
      <nav class="footer-nav-mini">
        <a href="index.html">Tienda</a>
        <a href="tracking.html">Rastreo</a>
        <a href="admin.html">Admin</a>
      </nav>
      <div class="footer-socials-mini">
        <a href="#" class="social-mini-link"><i class="fab fa-instagram"></i></a>
        <a href="#" class="social-mini-link"><i class="fab fa-facebook-f"></i></a>
        <a href="https://wa.me/tu_numero" class="social-mini-link"><i class="fab fa-whatsapp"></i></a>
      </div>
    </div>
  </footer>

  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module">
    import { buildTrackingUI } from './js/ui/order.js';
    
    document.addEventListener('DOMContentLoaded', () => {
      const container = document.getElementById('trackingContent');
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id') || params.get('pedido');
      
      const tracker = buildTrackingUI(container);
      tracker.init(id);

      window.addEventListener('beforeunload', () => tracker.cleanup());
    });
  </script>
</body>
</html>
