<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Lleva tu restaurante al siguiente nivel con CAMLY. Registra tu negocio hoy mismo.">
    <meta name="theme-color" content="#1A1A1A">
    <title>CAMLY | Registro de Negocio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles-v3.css">
    <link rel="icon" href="images/uploads/DOGCITY.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .register-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: var(--bg-global);
        }
        .register-card {
            width: 100%;
            max-width: 450px;
            background: #fff;
            border-radius: var(--r-xl);
            padding: 40px;
            box-shadow: var(--shadow-xl);
            position: relative;
            overflow: hidden;
        }
        .register-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 5px;
            background: linear-gradient(90deg, var(--accent-amber), var(--accent-red));
        }
        .register-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .register-header img {
            width: 70px;
            height: 70px;
            margin-bottom: 15px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }
        .register-header h1 {
            font-size: 1.75rem;
            font-weight: 900;
            color: #1a1a1a;
            letter-spacing: -0.5px;
        }
        .register-header p {
            color: #64748b;
            font-size: 0.9rem;
            margin-top: 5px;
        }
        .form-group-v3 {
            margin-bottom: 18px;
        }
        .form-label-v3 {
            display: block;
            font-size: 0.82rem;
            font-weight: 700;
            color: #475569;
            margin-bottom: 6px;
            margin-left: 4px;
        }
        .register-footer {
            margin-top: 25px;
            text-align: center;
            font-size: 0.85rem;
            color: #64748b;
        }
        .register-footer a {
            color: var(--accent-red);
            font-weight: 700;
            text-decoration: none;
        }
        .register-footer a:hover { text-decoration: underline; }
        
        .feature-grid {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #f1f5f9;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        .feature-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
            color: #64748b;
            font-weight: 600;
        }
        .feature-item i { color: #16a34a; font-size: 0.85rem; }
    </style>
</head>
<body class="theme-dark-global">

<div class="register-wrap">
    <div class="register-card">
        <header class="register-header">
            <img src="images/uploads/DOGCITY.png" alt="CAMLY Logo">
            <h1>Crea tu cuenta en CAMLY</h1>
            <p>Empieza a vender en línea en menos de 5 minutos.</p>
        </header>

        <form id="registerForm">
            <div class="form-group-v3">
                <label class="form-label-v3">Nombre de tu Restaurante</label>
                <div class="input-wrap-v3">
                    <span class="icon"><i class="fas fa-store"></i></span>
                    <input type="text" id="businessName" placeholder="Ej. El Palacio del Sabor" required>
                </div>
            </div>

            <div class="form-group-v3">
                <label class="form-label-v3">WhatsApp de Pedidos</label>
                <div class="input-wrap-v3">
                    <span class="icon"><i class="fab fa-whatsapp"></i></span>
                    <input type="tel" id="businessPhone" placeholder="Ej. 57314..." required>
                </div>
            </div>

            <div class="form-group-v3">
                <label class="form-label-v3">Correo Electrónico</label>
                <div class="input-wrap-v3">
                    <span class="icon"><i class="fas fa-envelope"></i></span>
                    <input type="email" id="email" placeholder="tu@email.com" required>
                </div>
            </div>

            <div class="form-group-v3" style="margin-bottom: 25px;">
                <label class="form-label-v3">Contraseña</label>
                <div class="input-wrap-v3">
                    <span class="icon"><i class="fas fa-lock"></i></span>
                    <input type="password" id="password" placeholder="Mínimo 6 caracteres" required minlength="6">
                </div>
            </div>

            <button type="submit" id="submitBtn" class="btn-wapp-massive">
                <strong>CREAR MI TIENDA AHORA</strong>
                <span>¡Es gratis por tiempo limitado! 🚀</span>
            </button>
        </form>

        <div class="feature-grid">
            <div class="feature-item"><i class="fas fa-check-circle"></i> Catálogo QR</div>
            <div class="feature-item"><i class="fas fa-check-circle"></i> Pedidos WhatsApp</div>
            <div class="feature-item"><i class="fas fa-check-circle"></i> Panel de Control</div>
            <div class="feature-item"><i class="fas fa-check-circle"></i> Seguimiento Realtime</div>
        </div>

        <div class="register-footer">
            ¿Ya tienes cuenta? <a href="admin.html">Inicia Sesión</a>
        </div>
    </div>
</div>

<script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="module" src="js/ui/register.js"></script>

</body>
</html>
